apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ollive-inference-console.fullname" . }}-config
  labels:
    {{- include "ollive-inference-console.labels" . | nindent 4 }}
data:
  DATABASE_HOST: {{ include "ollive-inference-console.databaseHost" . | quote }}
  DATABASE_PORT: {{ .Values.postgres.service.port | quote }}
  DATABASE_NAME: {{ .Values.postgres.auth.database | quote }}
  DATABASE_USER: {{ .Values.postgres.auth.username | quote }}
  DEFAULT_PROVIDER: {{ .Values.runtime.defaultProvider | quote }}
  LLM_MODEL: {{ .Values.runtime.llmModel | quote }}
  ANTHROPIC_MODEL: {{ .Values.runtime.anthropicModel | quote }}
