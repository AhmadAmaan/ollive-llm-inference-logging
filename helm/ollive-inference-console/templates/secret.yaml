apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ollive-inference-console.fullname" . }}-secrets
  labels:
    {{- include "ollive-inference-console.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "ollive-inference-console.databaseUrl" . | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
