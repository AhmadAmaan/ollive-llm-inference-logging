apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ollive-inference-console.fullname" . }}-worker
  labels:
    {{- include "ollive-inference-console.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      {{- include "ollive-inference-console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        {{- include "ollive-inference-console.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - npm
            - run
            - worker
          envFrom:
            - configMapRef:
                name: {{ include "ollive-inference-console.fullname" . }}-config
            - secretRef:
                name: {{ include "ollive-inference-console.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
