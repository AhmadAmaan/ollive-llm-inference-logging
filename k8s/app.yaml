apiVersion: v1
kind: Service
metadata:
  name: ollive-app
  namespace: ollive-assignment
spec:
  selector:
    app: ollive-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollive-app
  namespace: ollive-assignment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollive-app
  template:
    metadata:
      labels:
        app: ollive-app
    spec:
      containers:
        - name: web
          image: ollive-assignment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ollive-app-config
            - secretRef:
                name: ollive-app-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
